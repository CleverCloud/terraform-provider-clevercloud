---
name: acceptance tests

on:
  - pull_request

jobs:
  acceptance:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5
      fail-fast: false
      matrix:
        resource:
          - addon
          - addonprovider
          - configprovider
          - application
          - database/cellar
          - database/fsbucket
          - database/materiakv
          - database/mongodb
          - database/mysql
          - database/postgresql
          - database/pulsar
          - database/redis
          - drain
          - database/elasticsearch
          - networkgroup
          - oauth_consumer
          - software
          - kubernetes
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
    - name: Setup Terraform
      id: setup-terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_wrapper: false
    - name: Acceptance Tests
      run: go test ./pkg/resources/${{ matrix.resource }}/... -v -timeout 15m ./...
      env:
        TF_ACC: 1
        TF_ACC_TERRAFORM_PATH: ${{ steps.setup-terraform.outputs.terraform-path }}
        CC_OAUTH_TOKEN: ${{ secrets.CC_OAUTH_TOKEN }}
        CC_OAUTH_SECRET: ${{ secrets.CC_OAUTH_SECRET }}
        ORGANISATION: ${{ secrets.ORGANISATION }}
        CLONE_AUTH: ${{ secrets.CLONE_AUTH }}
  sweep:
    runs-on: ubuntu-latest
    needs: acceptance
    if: ${{ always() }} # run even if acceptance job fail
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
    - name: Sweepers
      if: always()
      run: make sweep
      env:
        CC_OAUTH_TOKEN: ${{ secrets.CC_OAUTH_TOKEN }}
        CC_OAUTH_SECRET: ${{ secrets.CC_OAUTH_SECRET }}
        ORGANISATION: ${{ secrets.ORGANISATION }}
        CC_ORGANISATION: ${{ secrets.CC_ORGANISATION }}

...
